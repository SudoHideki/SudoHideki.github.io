<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ポモドーロタイマー | 須藤秀樹研究室</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app-shell">
    <header class="topbar">
      <a href="../" class="back-link">須藤秀樹研究室</a>
      <div class="top-actions">
        <a href="stats.html" class="nav-button">グラフを見る</a>
        <time id="dateTime" class="date-time"></time>
      </div>
    </header>

    <section class="timer-panel" aria-label="ポモドーロタイマー">
      <p id="modeLabel" class="mode-label">作業中</p>

      <div class="moon-progress" id="moonProgress" aria-hidden="true">
        <div class="moon-core" id="moonCore"></div>
      </div>

      <div id="timeDisplay" class="time-display" aria-live="polite">25:00</div>

      <div class="task-row">
        <label for="taskInput">作業名</label>
        <input id="taskInput" type="text" list="taskNames" autocomplete="off" placeholder="例: 論文メモ">
        <datalist id="taskNames"></datalist>
      </div>

      <div class="settings-row">
        <label>
          作業
          <input id="workMinutes" type="number" min="1" max="240" step="1">
        </label>
        <label>
          休憩
          <input id="breakMinutes" type="number" min="1" max="120" step="1">
        </label>
        <button id="applyButton" type="button">反映</button>
      </div>

      <div class="controls" aria-label="操作">
        <button id="startButton" type="button" class="primary" title="開始">▶</button>
        <button id="pauseButton" type="button" title="一時停止">Ⅱ</button>
        <button id="resetButton" type="button" title="リセット">↺</button>
        <button id="workButton" type="button" title="作業へ戻る">↤</button>
      </div>

      <div class="stats">
        <div>
          <span>今日の作業回数</span>
          <strong id="workCount">0回</strong>
        </div>
        <div>
          <span>今日の作業時間</span>
          <strong id="totalMinutes">0分</strong>
        </div>
      </div>

      <div class="sound-row">
        <label for="soundFile">終了音</label>
        <input id="soundFile" type="file" accept=".wav,.wave,audio/wav,audio/wave,audio/x-wav,audio/*,.mp3,.m4a,.mp4,audio/mp4,video/mp4">
        <button id="testSoundButton" type="button">試聴</button>
        <button id="stopSoundButton" type="button">停止</button>
      </div>

      <div class="import-box">
        <div class="data-row">
          <label for="importDataFile">データを読み込む</label>
          <input id="importDataFile" type="file" accept=".csv,text/csv">
          <button id="importDataButton" type="button">読み込む</button>
        </div>
        <div class="import-actions">
          <button id="exportDataButton" type="button">データを書き出す</button>
          <span id="dataStatus" role="status"></span>
        </div>
      </div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
